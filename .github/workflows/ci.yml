name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Syntax check Python files
        run: python -m py_compile app.py weather_data.py weather_models.py weather_cache.py weather_grib.py tile_rendering.py grid_utils.py series_cache.py input_validation.py

      - name: Lint Python
        run: ruff check app.py weather_data.py weather_models.py weather_cache.py weather_grib.py tile_rendering.py grid_utils.py series_cache.py input_validation.py

      - name: Check Python formatting
        run: ruff format --check app.py weather_models.py weather_cache.py weather_grib.py tile_rendering.py grid_utils.py series_cache.py input_validation.py

      - name: Syntax check JavaScript
        run: node --check static/main.js

      - name: Run tests
        run: PYTHONPATH=. python -m unittest discover -s tests -p "test_*.py"
